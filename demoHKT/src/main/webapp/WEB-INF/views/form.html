<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
>
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h1>THêm mới</h1>
<form th:action="@{/add}" method="post" enctype="multipart/form-data" th:object="${product}">
    <label for="name">Name</label>
    <input type="text"  id="name" th:field="*{name}">
    <p th:errors="*{name}"></p>
    <br>
    <label for="des">Desciprion</label>
    <input type="text"  id="des" th:field="*{description}">
    <p th:errors="*{description}"></p>

    <br>
    <label for="url">Image</label>
    <input type="file"  id="url" th:field="*{url}">
    <br>
    <button type="submit">ADD</button>
</form>
</body>
</html>
