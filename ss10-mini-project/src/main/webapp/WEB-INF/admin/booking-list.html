<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Danh sách booking</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      margin: 0;
      padding: 20px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    th {
      background: #34495e;
      color: white;
      padding: 10px;
    }

    td {
      padding: 10px;
      text-align: center;
    }

    tr:nth-child(even) {
      background: #f2f2f2;
    }

    tr:hover {
      background: #eaf2ff;
    }

    .badge {
      padding: 4px 8px;
      border-radius: 5px;
      font-size: 12px;
    }

    .lab {
      background: #e67e22;
      color: white;
    }

    .device {
      background: #3498db;
      color: white;
    }

    .date {
      font-size: 13px;
      color: #555;
    }

    .status {
      background: #2ecc71;
      color: white;
      padding: 4px 8px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<h2>Danh sách booking</h2>

<table>
  <tr>
    <th>Tên SV</th>
    <th>MSSV</th>
    <th>Thiết bị</th>
    <th>Loại</th>
    <th>Số lượng</th>
    <th>Thời gian</th>
    <th>Trạng thái</th>
  </tr>

  <tr th:each="b : ${bookings}">
    <td th:text="${b.studentName}"></td>

    <td th:text="${b.studentCode}"></td>

    <td th:text="${b.equipment.name}"></td>

    <!-- 🔥 TYPE -->
    <td>
      <span th:if="${b.equipment.type == 'LAB'}" class="badge lab">Lab</span>
      <span th:if="${b.equipment.type == 'DEVICE'}" class="badge device">Device</span>
    </td>

    <td th:text="${b.quantity}"></td>

    <td class="date">
      <div th:text="${b.borrowDate}"></div>
      →
      <div th:text="${b.returnDate}"></div>
    </td>

    <!-- fake status -->
    <td>
      <span class="status">Pending</span>
    </td>
  </tr>
</table>

</body>
</html>
