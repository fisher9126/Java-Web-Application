<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm thiết bị</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-box {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 400px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            background: #4CAF50;
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        .note {
            font-size: 13px;
            color: #888;
            margin-top: 5px;
        }
    </style>
</head>

<body>

<div class="form-box">

    <h2>Thêm thiết bị</h2>

    <form action="/admin/equipment/save" method="post">

        <input name="name" placeholder="Tên thiết bị" required/>

        <input name="description" placeholder="Mô tả"/>

        <input id="quantity" name="quantity" type="number" placeholder="Số lượng" required/>

        <input name="imageUrl" placeholder="Image URL"/>

        <select name="type" onchange="handleType(this)">
            <option value="DEVICE">Thiết bị</option>
            <option value="LAB">Phòng Lab</option>
        </select>

        <div class="note" id="labNote" style="display:none;">
            Phòng Lab chỉ có số lượng = 1
        </div>

        <button type="submit">Lưu</button>

    </form>

</div>

<script>
    function handleType(select) {
        const qty = document.getElementById("quantity");
        const note = document.getElementById("labNote");

        if (select.value === "LAB") {
            qty.value = 1;
            qty.disabled = true;
            note.style.display = "block";
        } else {
            qty.disabled = false;
            note.style.display = "none";
        }
    }
</script>

</body>
</html>
