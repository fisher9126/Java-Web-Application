<!DOCTYPE html> <html xmlns:th="http://www.thymeleaf.org"> <head> <title>Đăng ký</title> <style> body { font-family: Arial; background: #f5f7fb; display: flex; justify-content: center; align-items: center; height: 100vh; } .form-box { background: #fff; padding: 25px; border-radius: 12px; width: 350px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); } h2 { text-align: center; margin-bottom: 20px; } input, textarea { width: 100%; padding: 8px; margin-top: 8px; margin-bottom: 5px; border-radius: 6px; border: 1px solid #ccc; } textarea { resize: none; height: 70px; } .error { color: red; font-size: 13px; margin-bottom: 8px; } .lab-note { background: #ffe0e0; padding: 8px; border-radius: 6px; margin-top: 10px; font-size: 13px; } button { width: 100%; padding: 10px; background: #4CAF50; border: none; color: white; border-radius: 6px; margin-top: 10px; cursor: pointer; } button:hover { background: #45a049; } </style> </head> <body> <div class="form-box"> <h2>Đăng ký mượn</h2> <form th:action="@{/booking}" th:object="${bookingDTO}" method="post"> <input type="hidden" th:field="*{equipmentId}"/> <input placeholder="Tên sinh viên" th:field="*{studentName}"/> <div class="error" th:errors="*{studentName}"></div> <input placeholder="MSSV" th:field="*{studentCode}"/> <div class="error" th:errors="*{studentCode}"></div> <input placeholder="Email" th:field="*{email}"/> <div class="error" th:errors="*{email}"></div> <!-- DEVICE --> <div th:if="${equipment.type == 'DEVICE'}"> <input type="number" placeholder="Số lượng" th:field="*{quantity}"/> <div class="error" th:errors="*{quantity}"></div> </div> <!-- LAB --> <div th:if="${equipment.type == 'LAB'}" class="lab-note"> Phòng Lab chỉ mượn 1 lần <input type="hidden" th:field="*{quantity}"/> </div> <input type="date" th:field="*{borrowDate}"/> <div class="error" th:errors="*{borrowDate}"></div> <input type="date" th:field="*{returnDate}"/> <div class="error" th:errors="*{returnDate}"></div> <!-- 🔥 lỗi global (custom validator) --> <div class="error" th:if="${#fields.hasGlobalErrors()}" th:each="err : ${#fields.globalErrors()}" th:text="${err}"> </div> <textarea placeholder="Lý do" th:field="*{reason}"></textarea> <button type="submit">Gửi đăng ký</button> </form> </div> </body> </html>
